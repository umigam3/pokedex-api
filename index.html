<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <script src="js/script.js"></script>
    <script src="https://kit.fontawesome.com/9009314442.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <title>Umigame's Pokedex</title>
</head>
<body class="h-100">
    <header class="main-header d-flex justify-content-center align-items-center overflow-hidden">
        <img src="img/pidgeot.gif" width="200">
        <h1 class="pb-4 text-light main-header__title text-center text-decoration-none text-white"><a href="">Umigame's PokéDex</a></h1>
        <img src="img/gengar.gif" width="200">
    </header>

    <nav class="navigation-bar position-absolute d-flex justify-content-center align-items-center">
        <ul class="navigation-bar__items w-100 mx-0 px-0 my-0 py-0 d-flex justify-content-around align-items-center list-unstyled">
            <li class="kanto"><a class="text-decoration-none text-light" href="#">Kanto</a></li>
            <li class="johto"><a class="text-decoration-none text-light" href="#">Johto</a></li>
            <li class="hoenn"><a class="text-decoration-none text-light" href="#">Hoenn</a></li>
            <li class="sinnoh"><a class="text-decoration-none text-light" href="#">Sinnoh</a></li>
            <li class="teselia"><a class="text-decoration-none text-light" href="#">Teselia</a></li>
            <li class="kalos"><a class="text-decoration-none text-light" href="#">Kalos</a></li>
            <li class="alola"><a class="text-decoration-none text-light" href="#">Alola</a></li>
            <li class="all"><a class="text-decoration-none text-light" href="#">All</a></li>
        </ul>
    </nav>

    <main class='mx-auto my-5 main-content p-3 bg-white'>
        <section class="d-flex justify-content-center">
            <div class="main-content__searchbar my-0 d-flex justify-content-around align-items-center w-50 mb-3">
                <input class="searchbar__input border-0 w-100" type="text" id="search-bar" onkeyup="search()" placeholder="Search by name...">
                <i class="fa fa-search"></i>
            </div>
        </section>
    </main>
</body>
</html>
