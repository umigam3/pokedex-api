<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/script.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Umigame's Pokedex</title>
</head>
<body>
    <header class="main-header d-flex justify-content-center align-items-center overflow-hidden">
        <img src="/img/pidgeot.gif" width="200">
        <h1 class="pb-4 mx-5 text-light">Umigame's PokéDex</h1>
        <img src="/img/gengar.gif" width="200">
    </header>

    <nav class="navigation-bar position-absolute d-flex justify-content-center align-items-center">
        <ul class="navigation-bar__items w-100 mx-0 px-0 my-0 py-0 d-flex justify-content-around align-items-center">
            <li><a class="text-decoration-none text-light" href="">Kanto</a></li>
            <li><a class="text-decoration-none text-light" href="">Johoto</a></li>
            <li><a class="text-decoration-none text-light" href="">Hoenn</a></li>
            <li><a class="text-decoration-none text-light" href="">Sinnoh</a></li>
            <li><a class="text-decoration-none text-light" href="">Teselia</a></li>
            <li><a class="text-decoration-none text-light" href="">Kalos</a></li>
            <li><a class="text-decoration-none text-light" href="">Alola</a></li>
            <li><a class="text-decoration-none text-light" href="">Galar</a></li>
            <li><a class="text-decoration-none text-light" href="">Paldea</a></li>
            <li><a class="text-decoration-none text-light" href="">All</a></li>
        </ul>
    </nav>

    <main class='mx-auto my-0 mt-5 main-content p-3' onload="getData()">
        <section class="d-flex justify-content-center">
            <div class="content__searchbar my-0 d-flex justify-content-around align-items-center w-50 mb-3">
                <input class="content__input border-0 w-100" type="text" id="searchBar" onkeyup="search()" placeholder="Search by name...">
                <i class="fa fa-search"></i>
            </div>
        </section>
    </main>
</body>
</html>
